<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Trekking Pro - GPS</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        #map { height: calc(100vh - 140px); width: 100%; }
        .btn-active { background-color: #ef4444 !important; }
    </style>
</head>
<body class="bg-gray-900 text-white overflow-hidden">

    <div id="map" class="bg-gray-800"></div>

    <div class="fixed bottom-0 left-0 right-0 bg-gray-800 p-2 shadow-2xl z-[1000] flex flex-col gap-2">
       
        <div class="flex justify-around gap-2">
            <button id="startBtn" class="flex-1 bg-green-600 p-3 rounded-xl font-bold uppercase text-sm shadow-lg">▶ Avvia</button>
            <button id="reverseBtn" class="flex-1 bg-blue-600 p-3 rounded-xl font-bold uppercase text-sm shadow-lg opacity-50" disabled>🔄 Inverti</button>
            <button id="resetBtn" class="bg-gray-600 p-3 rounded-xl font-bold uppercase text-sm shadow-lg">🗑️</button>
        </div>

        <div class="flex justify-around gap-2 border-t border-gray-700 pt-2">
            <button id="saveBtn" class="flex-1 bg-amber-600 p-2 rounded-lg font-semibold text-xs shadow opacity-50" disabled>💾 Salva Percorso</button>
            <label class="flex-1 bg-purple-600 p-2 rounded-lg font-semibold text-xs shadow text-center cursor-pointer">
                📂 Carica File
                <input type="file" id="loadInput" class="hidden" accept=".json">
            </label>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        let map, pathLine, reverseLine, userMarker;
        let coords = [];
        let watchId = null;
        let isReversed = false;

        // 1. Inizializzazione Mappa (Centrata su Italia di default)
        map = L.map('map', { zoomControl: false }).setView([41.9, 12.5], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);
        L.control.zoom({ position: 'topright' }).addTo(map);

        // Elementi grafici
        pathLine = L.polyline([], {color: '#10b981', weight: 6}).addTo(map);
        reverseLine = L.polyline([], {color: '#ef4444', weight: 6, dashArray: '10, 15'});
        userMarker = L.circleMarker([0,0], {radius: 9, color: 'white', fillColor: '#3b82f6', fillOpacity: 1, weight: 3}).addTo(map);

        // Funzione aggiornamento posizione
        function updateLocation(position) {
            const lat = position.coords.latitude;
            const lng = position.coords.longitude;
            const newPos = [lat, lng];

            userMarker.setLatLng(newPos);
           
            if (watchId !== null && !isReversed) {
                coords.push(newPos);
                pathLine.setLatLngs(coords);
                map.panTo(newPos);
               
                // Abilita pulsanti se abbiamo dati
                if (coords.length > 1) {
                    document.getElementById('reverseBtn').disabled = false;
                    document.getElementById('reverseBtn').classList.remove('opacity-50');
                    document.getElementById('saveBtn').disabled = false;
                    document.getElementById('saveBtn').classList.remove('opacity-50');
                }
            }
        }

        function handleError(err) {
            console.warn("Errore GPS: " + err.message);
        }

        // --- AZIONI PULSANTI ---

        // AVVIA / FERMA
        document.getElementById('startBtn').onclick = function() {
            if (watchId === null) {
                isReversed = false;
                reverseLine.remove();
                pathLine.addTo(map);
               
                watchId = navigator.geolocation.watchPosition(updateLocation, handleError, {
                    enableHighAccuracy: true,
                    maximumAge: 0
                });
               
                this.innerText = "⏹ Ferma";
                this.classList.add('btn-active');
            } else {
                navigator.geolocation.clearWatch(watchId);
                watchId = null;
                this.innerText = "▶ Avvia";
                this.classList.remove('btn-active');
            }
        };

        // INVERTI PERCORSO
        document.getElementById('reverseBtn').onclick = function() {
            if (coords.length < 2) return;
            isReversed = !isReversed;
           
            if (isReversed) {
                const revCoords = [...coords].reverse();
                reverseLine.setLatLngs(revCoords).addTo(map);
                pathLine.remove();
                this.innerText = "⬅️ Indietro";
                map.fitBounds(reverseLine.getBounds());
            } else {
                reverseLine.remove();
                pathLine.addTo(map);
                this.innerText = "🔄 Inverti";
            }
        };

        // SALVA FILE (JSON)
        document.getElementById('saveBtn').onclick = function() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(coords));
            const downloadAnchorNode = document.createElement('a');
            downloadAnchorNode.setAttribute("href", dataStr);
            downloadAnchorNode.setAttribute("download", "percorso_trekking.json");
            document.body.appendChild(downloadAnchorNode);
            downloadAnchorNode.click();
            downloadAnchorNode.remove();
        };

        // CARICA FILE
        document.getElementById('loadInput').onchange = function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const importedCoords = JSON.parse(e.target.result);
                    coords = importedCoords;
                    pathLine.setLatLngs(coords);
                    map.fitBounds(pathLine.getBounds());
                    document.getElementById('reverseBtn').disabled = false;
                    document.getElementById('reverseBtn').classList.remove('opacity-50');
                    alert("Percorso caricato con successo!");
                } catch (err) {
                    alert("Errore nel caricamento del file.");
                }
            };
            reader.readAsText(file);
        };

        // RESET
        document.getElementById('resetBtn').onclick = function() {
            if(confirm("Vuoi cancellare il percorso attuale?")) location.reload();
        };

        // Localizzazione iniziale rapida
        navigator.geolocation.getCurrentPosition(updateLocation, handleError);

    </script>
</body>
</html>
