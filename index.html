<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TREKKING GPS DEFINITIVO</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #1a1a1a; font-family: sans-serif; }
        #map { height: 70vh; width: 100%; background: #222; }
        .controls { height: 30vh; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px; box-sizing: border-box; background: #333; }
        button { 
            border: none; border-radius: 10px; color: white; font-weight: bold; font-size: 14px; text-transform: uppercase;
            box-shadow: 0 4px #000; active { box-shadow: 0 2px #000; transform: translateY(2px); }
        }
        .btn-start { background: #2ecc71; grid-column: span 2; font-size: 18px; }
        .btn-pause { background: #e67e22; }
        .btn-reverse { background: #3498db; }
        .btn-save { background: #f1c40f; color: black; }
        .btn-reset { background: #95a5a6; }
        .recording { background: #e74c3c !important; animation: blink 1s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        #status { position: absolute; top: 10px; left: 10px; z-index: 1000; background: rgba(0,0,0,0.7); color: #0f0; padding: 5px 10px; border-radius: 5px; font-size: 12px; }
    </style>
</head>
<body>

    <div id="status">GPS: In attesa...</div>
    <div id="map"></div>

    <div class="controls">
        <button id="startBtn" class="btn-start">▶ Inizia Percorso</button>
        <button id="pauseBtn" class="btn-pause">🚩 Sosta</button>
        <button id="reverseBtn" class="btn-reverse">🔄 Inverti</button>
        <button id="saveBtn" class="btn-save">💾 Salva</button>
        <button id="resetBtn" class="btn-reset">🗑️ Reset</button>
    </div>

    <script>
        let map, pathLine, reverseLine, userMarker;
        let coords = [];
        let watchId = null;
        let isReversed = false;
        const statusEl = document.getElementById('status');

        // Inizializzazione sicura della mappa
        try {
            map = L.map('map', { zoomControl: false }).setView([45.0, 9.0], 13);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            
            pathLine = L.polyline([], {color: '#2ecc71', weight: 5}).addTo(map);
            reverseLine = L.polyline([], {color: '#e74c3c', weight: 5, dashArray: '10, 10'});
            userMarker = L.circleMarker([0,0], {radius: 8, color: 'white', fillColor: '#3498db', fillOpacity: 1}).addTo(map);
            
            statusEl.innerText = "Mappa OK. Pronto.";
        } catch (e) {
            statusEl.innerText = "Errore caricamento mappa!";
            statusEl.style.color = "red";
        }

        function updatePos(position) {
            const lat = position.coords.latitude;
            const lng = position.coords.longitude;
            const pos = [lat, lng];
            
            statusEl.innerText = `GPS OK: ${lat.toFixed(4)}, ${lng.toFixed(4)}`;
            userMarker.setLatLng(pos);

            if (watchId !== null && !isReversed) {
                coords.push(pos);
                pathLine.setLatLngs(coords);
                map.panTo(pos);
            }
        }

        document.getElementById('startBtn').onclick = function() {
            if (watchId === null) {
                watchId = navigator.geolocation.watchPosition(updatePos, 
                    (err) => { statusEl.innerText = "Errore GPS: " + err.message; }, 
                    { enableHighAccuracy: true }
                );
                this.innerText = "⏹ Ferma";
                this.classList.add('recording');
                L.marker(userMarker.getLatLng()).addTo(map).bindPopup("Partenza");
            } else {
                navigator.geolocation.clearWatch(watchId);
                watchId = null;
                this.innerText = "▶ Inizia Percorso";
                this.classList.remove('recording');
            }
        };

        document.getElementById('pauseBtn').onclick = function() {
            const p = userMarker.getLatLng();
            L.marker([p.lat, p.lng], {
                icon: L.divIcon({html: '🚩', className: 'my-div-icon', iconSize: [30, 30]})
            }).addTo(map).bindPopup("Sosta");
        };

        document.getElementById('reverseBtn').onclick = function() {
            if (coords.length < 2) return;
            isReversed = !isReversed;
            if (isReversed) {
                reverseLine.setLatLngs([...coords].reverse()).addTo(map);
                pathLine.remove();
                this.innerText = "⬅️ Modo Inv.";
            } else {
                reverseLine.remove();
                pathLine.addTo(map);
                this.innerText = "🔄 Inverti";
            }
        };

        document.getElementById('saveBtn').onclick = function() {
            const blob = new Blob([JSON.stringify(coords)], {type: "application/json"});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = "percorso.json"; a.click();
        };

        document.getElementById('resetBtn').onclick = function() {
            if(confirm("Vuoi resettare?")) location.reload();
        };

        // Chiedi subito posizione
        navigator.geolocation.getCurrentPosition(updatePos);
    </script>
</body>
</html>
