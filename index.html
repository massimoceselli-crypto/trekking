<!DOCTYPE html><html lang="it"><head> <meta charset="UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"> <title>Trekking Pro - GPS con Soste</title> <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" /> <script src="https://cdn.tailwindcss.com"></script> <style> #map { height: calc(100vh - 160px); width: 100%; } .btn-recording { background-color: #ef4444 !important; animation: pulse 2s infinite; } @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } } </style></head><body class="bg-gray-900 text-white overflow-hidden"> <div id="map" class="bg-gray-800"></div> <div class="fixed bottom-0 left-0 right-0 bg-gray-800 p-2 shadow-2xl z-[1000] flex flex-col gap-2"> <div class="flex justify-around gap-2"> <button id="startBtn" class="flex-[2] bg-green-600 p-3 rounded-xl font-bold uppercase text-sm shadow-lg"> Inizia Percorso</button> <button id="pauseBtn" class="flex-1 bg-orange-500 p-3 rounded-xl font-bold uppercase text-sm shadow-lg opacity-50" disabled> Sosta</button> </div> <div class="flex justify-around gap-2 border-t border-gray-700 pt-2"> <button id="reverseBtn" class="flex-1 bg-blue-600 p-2 rounded-lg font-semibold text-xs shadow opacity-50" disabled> Inverti</button> <button id="saveBtn" class="flex-1 bg-amber-600 p-2 rounded-lg font-semibold text-xs shadow opacity-50" disabled> Salva</button> <button id="resetBtn" class="bg-gray-600 p-2 rounded-lg font-semibold text-xs shadow"> </button> </div> </div> <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script> <script> let map, pathLine, reverseLine, userMarker; let coords = []; let watchId = null; let isReversed = false; // Inizializzazione Mappa map = L.map('map', { zoomControl: false }).setView([41.9, 12.5], 15); L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map); pathLine = L.polyline([], {color: '#10b981', weight: 6}).addTo(map); reverseLine = L.polyline([], {color: '#ef4444', weight: 6, dashArray: '10, 15'}); userMarker = L.circleMarker([0,0], {radius: 9, color: 'white', fillColor: '#3b82f6', fillOpacity: 1, weight: 3}).addTo(map); function updateLocation(position) { const lat = position.coords.latitude; const lng = position.coords.longitude; const newPos = [lat, lng]; userMarker.setLatLng(newPos); if (watchId !== null && !isReversed) { // Aggiungi coordinata solo se diversa dall'ultima (risparmio batteria/precisione) if (coords.length === 0 || coords[coords.length-1][0] !== lat) { coords.push(newPos); pathLine.setLatLngs(coords); map.panTo(newPos); // Attiva pulsanti document.getElementById('pauseBtn').disabled = false; document.getElementById('pauseBtn').classList.remove('opacity-50'); if (coords.length > 1) { document.getElementById('reverseBtn').disabled = false; document.getElementById('reverseBtn').classList.remove('opacity-50'); document.getElementById('saveBtn').disabled = false; document.getElementById('saveBtn').classList.remove('opacity-50'); } } } } // --- FUNZIONI PULSANTI --- document.getElementById('startBtn').onclick = function() { if (watchId === null) { watchId = navigator.geolocation.watchPosition(updateLocation, (e) => console.log(e), { enableHighAccuracy: true, maximumAge: 0 }); this.innerText = " Ferma Registrazione"; this.classList.add('btn-recording'); // Segnaposto Partenza navigator.geolocation.getCurrentPosition(p => { L.marker([p.coords.latitude, p.coords.longitude]).addTo(map).bindPopup("Partenza").openPopup(); }); } else { navigator.geolocation.clearWatch(watchId); watchId = null; this.innerText = " Inizia Percorso"; this.classList.remove('btn-recording'); } }; document.getElementById('pauseBtn').onclick = function() { navigator.geolocation.getCurrentPosition(p => { const pausePos = [p.coords.latitude, p.coords.longitude]; L.marker(pausePos, { icon: L.icon({ iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-red.png', shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png', iconSize: [25, 41], iconAnchor: [12, 41] }) }).addTo(map).bindPopup("Sosta/Pausa").openPopup(); }); }; document.getElementById('reverseBtn').onclick = function() { if (coords.length < 2) return; isReversed = !isReversed; if (isReversed) { const rev = [...coords].reverse(); reverseLine.setLatLngs(rev).addTo(map); pathLine.remove(); this.innerText = " Modo Inverso"; map.fitBounds(reverseLine.getBounds()); } else { reverseLine.remove(); pathLine.addTo(map); this.innerText = " Inverti"; } }; document.getElementById('saveBtn').onclick = function() { const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(coords)); const dl = document.createElement('a'); dl.setAttribute("href", dataStr); dl.setAttribute("download", "trekking_percorso.json"); dl.click(); }; document.getElementById('resetBtn').onclick = function() { if(confirm("Cancellare tutto?")) location.reload(); }; navigator.geolocation.getCurrentPosition(updateLocation); </script></body></html>
